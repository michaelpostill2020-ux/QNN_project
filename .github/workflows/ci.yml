name: QML Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libhdf5-dev

    - name: Install Python Package Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install packages directly
        pip install uproot pandas numpy sympy requests aiohttp pyyaml tensorflow==2.15.0 tensorflow-quantum cirq scikit-learn awkward awkward-pandas tables pytest

    - name: Run Test Suite
      run: |
        # Pytest will automatically discover generate_mock_data and run test_integration.py
        python -m pytest -v